<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="subject-toggle" role="tablist" aria-label="Subject">
      <button type="button" class="subject-btn active" id="btnMath" role="tab" aria-selected="true">Math</button>
      <button type="button" class="subject-btn" id="btnEnglish" role="tab" aria-selected="false">English</button>
      <button type="button" class="subject-btn" id="btnChinese" role="tab" aria-selected="false">中文</button>
    </div>

    <main class="card" id="questionCard">
      <div class="meta" id="metaLine">Loading…</div>
      <h2 class="question" id="questionText">Pick a question to start.</h2>

      <div class="explain-panel hidden" id="explainPanel" aria-live="polite">
        <div class="explain-block">
          <span class="explain-label" id="explainLabel1">Key idea</span>
          <p id="keyIdea"></p>
        </div>
        <div class="explain-block">
          <span class="explain-label" id="explainLabel2">Example</span>
          <p id="exampleText"></p>
        </div>
      </div>

      <div class="answer-panel hidden" id="answerPanel" aria-live="polite">
        <span class="explain-label" id="answerLabel">Answer</span>
        <p id="answerText"></p>
      </div>
    </main>

    <nav class="actions" aria-label="Practice actions">
      <button type="button" class="btn btn-primary" id="btnAnswer" title="Show explanation and answer">
        <span class="btn-short">Answer</span>
      </button>
      <button type="button" class="btn btn-sound hidden" id="btnSound" title="Play Mandarin pronunciation" aria-label="Play sound">
        <span class="btn-short">🔊 Sound</span>
      </button>
      <select id="filterSelect" class="select-large" aria-label="Filter">
        <option value="all">All chapters</option>
      </select>
    </nav>

    <footer class="footer">
      <span id="statsLine"></span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
